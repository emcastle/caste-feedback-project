# To run dependencies update only: 
#   "conda env update -n feedback -f environment.yml"
# To run dependencies update and remove packages that aren't in .yml
#   "conda env update -n feedback -f environment.yml --prune"

name: feedback

channels:
  - https://nexus.it.census.gov:8443/repository/conda-proxy/conda-forge
  - https://nexus.it.census.gov:8443/repository/conda-premium-proxy/main
  - https://nexus.it.census.gov:8443/repository/conda-proxy/free
  - https://nexus.it.census.gov:8443/repository/conda-premium-proxy/r
  - https://nexus.it.census.gov:8443/repository/conda-premium-proxy/msys2

dependencies:
  - python=3.11
  - pip

  # core
  - pandas
  - numpy
  - pyarrow
  - openpyxl
  - tqdm

  # pdf/doc
  - pypdf
  - python-docx

  # imaging stack (prevents PIL._imaging DLL failures on Windows)
  - pillow
  - libjpeg-turbo
  - libpng
  - libtiff
  - libwebp
  - freetype
  - lcms2
  - zlib

  # OCR (optional; keep if you want)
  - tesseract
  - pytesseract
  - pdf2image
  - poppler

  # PDF 
  - python-pptx

  # pip-only
  - pip:
      - pymupdf

